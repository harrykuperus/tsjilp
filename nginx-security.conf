# nginx-security.conf
# Include this inside your server {} block.
# Example:  include /path/to/eidolon/nginx-security.conf;

# Block all dotfiles except Let's Encrypt well-known
location ~ /\.(?!well-known) {
    deny all;
}

# Block direct access to sensitive file types
location ~* \.(env|ini|log|sql|bak|backup|zip|tar|gz)$ {
    deny all;
}

# Block the secrets loader from being served directly
location ~* /config/secrets\.php$ {
    deny all;
}

# Block direct access to all user/chat data
location ^~ /data/ {
    deny all;
}

# Block auth session/config JSON files
location ~* /auth/.*\.json$ {
    deny all;
}

# Block config JSON that could leak server settings
location ~* /config/.*\.json$ {
    deny all;
}
